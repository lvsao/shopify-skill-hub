interface:
  display_name: "Shopify Store Translator"
  short_description: "Translate all Shopify store resources into any target language with a preview-first, approval-based workflow"
  default_prompt: "Use $shopify-store-translator to check the store's current language and market configuration, fetch all translatable product and store content, translate it into the target language, generate a CSV audit table for review, and write approved translations to Shopify only after explicit user confirmation."
