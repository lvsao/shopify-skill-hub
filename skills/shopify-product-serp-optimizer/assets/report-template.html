<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      --ink: oklch(23% 0.028 68);
      --muted: oklch(46% 0.026 68);
      --paper: oklch(97% 0.018 80);
      --surface: oklch(99% 0.009 82);
      --surface-strong: oklch(94% 0.028 82);
      --line: oklch(84% 0.027 78);
      --accent: oklch(52% 0.12 154);
      --accent-soft: oklch(90% 0.06 154);
      --amber: oklch(82% 0.12 85);
      --rose: oklch(72% 0.12 28);
      --shadow: 0 20px 60px oklch(38% 0.04 70 / 0.12);
      --radius: 8px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-2xl: 32px;
      --space-3xl: 48px;
      --content: min(1180px, calc(100vw - 32px));
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, oklch(96% 0.02 78), oklch(99% 0.01 112) 44%, oklch(95% 0.025 52)),
        var(--paper);
      font-family: "Aptos", "Segoe UI", sans-serif;
      line-height: 1.55;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background-image:
        linear-gradient(90deg, oklch(72% 0.035 80 / 0.25) 1px, transparent 1px),
        linear-gradient(180deg, oklch(72% 0.035 80 / 0.18) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 70%);
    }

    .report-shell {
      position: relative;
      width: var(--content);
      margin: 0 auto;
      padding: var(--space-3xl) 0;
    }

    h1,
    h2,
    h3,
    h4,
    p {
      margin: 0;
    }

    h1,
    h2 {
      font-family: "Constantia", "Georgia", serif;
      line-height: 1.04;
      font-weight: 700;
    }

    h1 {
      max-width: 920px;
      font-size: clamp(2.45rem, 7vw, 5.75rem);
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.6rem, 3.4vw, 3rem);
      letter-spacing: 0;
    }

    h3 {
      font-size: 1rem;
      line-height: 1.25;
      letter-spacing: 0;
      margin-bottom: var(--space-md);
    }

    h4 {
      font-size: 0.88rem;
      line-height: 1.25;
      color: var(--muted);
      margin-bottom: var(--space-sm);
    }

    p,
    li,
    dd,
    dt {
      font-size: 0.96rem;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 700;
    }

    .lead {
      max-width: 780px;
      margin-top: var(--space-lg);
      color: var(--muted);
      font-size: 1.14rem;
    }

    .cover {
      min-height: 100vh;
      display: grid;
      align-content: center;
      gap: var(--space-2xl);
      padding: var(--space-2xl) 0 var(--space-3xl);
      break-after: page;
    }

    .cover-grid,
    .bento {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: var(--space-lg);
    }

    .cover-grid article,
    .card,
    .batch-strip article {
      background: color-mix(in oklch, var(--surface), transparent 3%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .cover-grid article {
      grid-column: span 3;
      min-height: 136px;
      padding: var(--space-xl);
      display: grid;
      align-content: space-between;
      gap: var(--space-lg);
    }

    .cover-grid span {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    .cover-grid strong {
      display: block;
      font-size: clamp(1.35rem, 2.5vw, 2.25rem);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .cover-grid small {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .cover-section {
      background: color-mix(in oklch, var(--surface-strong), transparent 32%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: var(--space-xl);
    }

    .cover-section h2 {
      font-size: clamp(1.35rem, 2.5vw, 2.15rem);
      margin-bottom: var(--space-lg);
    }

    .boundaries p {
      max-width: 90ch;
      color: var(--muted);
    }

    .batch-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-lg);
    }

    .batch-strip article {
      box-shadow: none;
      padding: var(--space-lg);
      min-height: 180px;
    }

    .batch-strip strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: var(--space-sm);
    }

    .batch-strip span {
      display: block;
      color: var(--muted);
      margin-bottom: var(--space-md);
    }

    .product-page {
      min-height: 100vh;
      padding: var(--space-3xl) 0;
      break-after: page;
    }

    .product-page:last-child {
      break-after: auto;
    }

    .product-hero {
      display: grid;
      gap: var(--space-md);
      margin-bottom: var(--space-2xl);
      max-width: 980px;
    }

    .product-hero p:last-child {
      color: var(--muted);
    }

    .card {
      grid-column: span 4;
      min-height: 248px;
      padding: var(--space-xl);
      overflow: visible;
    }

    .card.wide {
      grid-column: span 8;
    }

    .score-card {
      background: linear-gradient(160deg, var(--accent-soft), var(--surface) 60%);
    }

    .score {
      font-family: "Constantia", "Georgia", serif;
      font-size: clamp(3rem, 6vw, 5.5rem);
      line-height: 0.95;
      color: var(--accent);
      margin-bottom: var(--space-md);
    }

    .snippet {
      display: grid;
      gap: var(--space-sm);
      padding: var(--space-lg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: oklch(98% 0.011 82);
    }

    .snippet + .snippet {
      margin-top: var(--space-md);
    }

    .snippet strong {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .recommend .snippet {
      background: oklch(95% 0.04 150);
      border-color: color-mix(in oklch, var(--accent), var(--line) 62%);
    }

    .clean-list {
      list-style: none;
      display: grid;
      gap: var(--space-sm);
      margin: 0;
      padding: 0;
    }

    .clean-list li {
      padding: var(--space-sm) var(--space-md);
      background: oklch(97% 0.014 78);
      border: 1px solid oklch(88% 0.025 78);
      border-radius: 6px;
    }

    .kv-list {
      display: grid;
      gap: var(--space-md);
    }

    .kv-list div {
      display: grid;
      gap: var(--space-xs);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--line);
    }

    .kv-list div:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    dt {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    dd {
      margin: 0;
    }

    dd span {
      display: block;
      color: var(--muted);
      margin-top: var(--space-xs);
    }

    .mini-grid,
    .community-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: var(--space-md);
    }

    .mini-card,
    .community-grid > div {
      min-height: 160px;
      padding: var(--space-lg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: oklch(98% 0.012 78);
    }

    .mini-card p + p {
      margin-top: var(--space-sm);
    }

    .mini-card strong {
      color: var(--ink);
    }

    .community-grid p {
      color: var(--ink);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .report-shell {
        width: min(100vw - 24px, 680px);
        padding: var(--space-xl) 0;
      }

      .cover-grid,
      .bento {
        grid-template-columns: 1fr;
      }

      .cover-grid article,
      .card,
      .card.wide {
        grid-column: auto;
      }

      .cover {
        min-height: auto;
        padding-top: var(--space-2xl);
      }

      .product-page {
        min-height: auto;
        padding: var(--space-2xl) 0;
      }
    }

    @media print {
      :root {
        --paper: white;
        --surface: white;
        --shadow: none;
      }

      body {
        background: white;
      }

      body::before {
        display: none;
      }

      .report-shell {
        width: auto;
        padding: 0;
      }

      .cover,
      .product-page {
        min-height: auto;
        padding: 24px 0;
        break-after: page;
      }

      .product-page:last-child {
        break-after: auto;
      }

      .card,
      .cover-grid article,
      .batch-strip article {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main class="report-shell" aria-label="Shopify Product SERP Audit Report">
    {{REPORT_CONTENT}}
  </main>
</body>
</html>
